  # Opt-in container reuse to remove repeated Keycloak cold-starts: KeycloakPersistent flag in
  # AppHost (default OFF, honors the "prefer non-persistent resources" rule) + KEYCLOAK_TEST_REUSE
  # opt-in in Tier 3 fixtures (default OFF so CI stays cold/clean). NOTE: a WaitForStart relaxation
  # was rejected — all services must WaitFor(keycloak) healthy (incl. tests) to avoid OIDC races.
  # No PRD/architecture/MVP impact.
  # Code applied + AppHost/IntegrationTests build green. Runtime warm-reattach smoke (2026-05-25):
  # §5.5 build PASS. §5.1 originally FAILED — bare WithLifetime(Persistent) recreated the container
  # on every `aspire run` (3 runs -> 3 distinct containers) because Aspire assigns Keycloak's
  # http/management endpoints random host ports each run, churning DCP's lifecycle-key. Spike fix
  # (proxyless fixed ports http->8180, management->8543, gated on KeycloakPersistent) stabilizes the
  # lifecycle-key: 2 consecutive `aspire run` REUSE the same container; OIDC discovery returns 200.
  # Landed EXPERIMENTAL — proxyless fixed ports are fragile (first pick 9180 collided with Logitech
  # G Hub; concurrent topologies conflict on 8180/8543). See proposal section "Runtime Warm-Reattach
  # Smoke + Spike (2026-05-25)". DONE: finished + validated by dw19b (2026-05-25) — Tier 3 fixture
  # reuse proven across two `dotnet test` runs (byte-identical container ID/CreatedAt/lifecycle-key,
  # warm run ~26% faster; DistributedApplicationTestingBuilder/DisposeAsync does NOT tear down the
  # persistent container). Fixed ports made configurable + validated; fixture env-restore leak fixed.
  post-epic-deferred-dw19-keycloak-dev-fast-start: done
