# DAPR Access Control Configuration for the sample sidecar -- Production (D4, FR34, NFR15)
# =========================================================================================
# This Configuration CRD is bound ONLY to the sample sidecar and therefore governs which
# CALLERS may invoke the sample domain service through DAPR service invocation.
#
# Allowed callers in the production topology:
#   - commandapi: actor host / domain service invoker. Uses POST-only DAPR service invocation
#     to process domain commands.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: accesscontrol-sample
spec:
  accessControl:
    defaultAction: deny  # Deny-by-default in production with mTLS identity
    trustDomain: "{env:DAPR_TRUST_DOMAIN|hexalith.io}"
    policies:
      - appId: commandapi
        defaultAction: deny
        trustDomain: "{env:DAPR_TRUST_DOMAIN|hexalith.io}"
        namespace: "{env:DAPR_NAMESPACE|hexalith}"
        operations:
          - name: /**
            httpVerb: ['POST']
            action: allow