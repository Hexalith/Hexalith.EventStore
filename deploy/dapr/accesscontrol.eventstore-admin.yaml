# DAPR Access Control Configuration for the Admin.Server sidecar -- Production (D4, FR34, NFR15)
# ==============================================================================================
# This Configuration CRD is bound ONLY to the eventstore-admin sidecar and therefore governs which
# CALLERS may invoke Admin.Server through DAPR service invocation.
#
# In the production topology no peer workload should invoke eventstore-admin through DAPR.
# Admin.Server is an HTTP-facing host that delegates to EventStore and should not expose an
# inbound DAPR surface to other workloads.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: accesscontrol-eventstore-admin
spec:
  accessControl:
    defaultAction: deny  # Deny-by-default in production with mTLS identity
    trustDomain: "{env:DAPR_TRUST_DOMAIN|hexalith.io}"
    policies: []
