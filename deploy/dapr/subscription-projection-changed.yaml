# DAPR Declarative Subscription -- Projection Change Notifications (Story 18.1)
# ===============================================================================
# Receives projection change notifications from external domain services.
# Topic follows CFD-1: {tenantId}.{projectionType}.projection-changed
# Wildcard subscription covers all tenants and projection types.
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: projection-changed
spec:
  pubsubname: pubsub
  topic: "*.*.projection-changed"
  routes:
    default: /projections/changed
scopes:
  - commandapi
