apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: accesscontrol
spec:
  accessControl:
    defaultAction: deny
    trustDomain: "TODO: production trust domain"
    policies:
      - appId: commandapi
        defaultAction: deny
        namespace: "TODO: production namespace"
        operations:
          - name: /v1.0/state/*
            httpVerb: ["GET", "POST", "DELETE"]
            action: allow
          - name: /v1.0/publish/*
            httpVerb: ["POST"]
            action: allow
