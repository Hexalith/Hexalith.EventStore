# DAPR Access Control Configuration for the EventStore sidecar -- Production (D4, FR34, NFR15)
# =============================================================================================
# This Configuration CRD is bound ONLY to the eventstore sidecar and therefore governs which
# CALLERS may invoke EventStore endpoints through DAPR service invocation.
#
# Allowed callers in the production topology:
#   - eventstore-admin: Admin REST API host. Needs GET/POST/PUT to delegate admin reads and writes
#     to EventStore (ADR-P4).
#
# Security Posture: defaultAction: deny (secure by default, D4)
# Trust Domain: Configure for production environment (see trustDomain below)
# Namespace: Configure for production Kubernetes namespace (see namespace below)
#
# Bind this config ONLY to the EventStore workload. Other receiving services (eventstore-admin,
# sample, future domain services) should each have their own DAPR Configuration CRD so caller
# policies apply only to the intended inbound surface.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: accesscontrol
spec:
  accessControl:
    defaultAction: deny  # Deny-by-default security posture (D4, AC #4)
    # SPIFFE trust domain for mTLS identity validation (AC #11).
    # Replace with your production trust domain (or set DAPR_TRUST_DOMAIN env var).
    # All sidecars must present certificates
    # from this trust domain. Mismatched trust domains are rejected at TLS handshake.
    trustDomain: "{env:DAPR_TRUST_DOMAIN|hexalith.io}"
    policies:
      # eventstore-admin: Admin API host -- invokes eventstore for write delegation (ADR-P4).
      # Admin.Server delegates reads and writes through EventStore endpoints exposed over DAPR.
      - appId: eventstore-admin
        defaultAction: deny  # Deny any operations not explicitly listed
        trustDomain: "{env:DAPR_TRUST_DOMAIN|hexalith.io}"
        # Replace with production Kubernetes namespace where eventstore is deployed
        # (or set DAPR_NAMESPACE env var).
        namespace: "{env:DAPR_NAMESPACE|hexalith}"
        operations:
          # Admin.Server delegates reads and writes through EventStore using GET/POST/PUT.
          # Wildcard (/**) allows the existing admin passthrough endpoints while the
          # command surface remains protected by EventStore authorization.
          - name: /**
            httpVerb: ['GET', 'POST', 'PUT']
            action: allow
