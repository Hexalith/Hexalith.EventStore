# DAPR Declarative Subscription -- Production Template (Sample Counter)
# ====================================================================
# Demonstrates per-subscription dead-letter routing for Story 4.3 AC #3.
# Topic follows D6: {tenant}.{domain}.events
# Dead-letter topic follows Story 4.3/4.5 convention: deadletter.{tenant}.{domain}.events
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: sample-counter-events
spec:
  pubsubname: pubsub
  topic: sample.counter.events
  routes:
    default: /events/idempotency-demo
  deadLetterTopic: deadletter.sample.counter.events
scopes:
  - sample
