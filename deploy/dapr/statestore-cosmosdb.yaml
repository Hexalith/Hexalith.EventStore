# DAPR State Store Component -- Production Cosmos DB (D1, NFR13)
# ================================================================
# Azure Cosmos DB-backed state store for actor state, snapshots, and command status tracking.
# Composite key pattern: {tenant}||{domain}||{aggregateId} (D1)
#
# Component Scoping (AC #2, AC #4, AC #13):
#   eventstore accesses actor state, snapshots, and command status.
#   eventstore-admin reads admin indexes and performs direct health/state probes.
#   Domain services have zero state store access -- no read, no write.
#
# Adding New Domain Services:
#   DO NOT add new domain services to scopes. Domain services have zero state store
#   access (D4). If a domain service needs configuration data, use a separate scoped
#   component (not the actor state store).
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.azure.cosmosdb
  version: v1
  metadata:
    - name: url
      # Cosmos DB account URL. Format: https://<account-name>.documents.azure.com:443/
      value: "{env:COSMOSDB_URL}"
    - name: masterKey
      # Cosmos DB primary or secondary key -- NEVER hardcode (NFR14). Use Azure Key Vault in production.
      value: "{env:COSMOSDB_KEY}"
    - name: database
      # Cosmos DB database name for actor state storage.
      value: "{env:COSMOSDB_DATABASE}"
    - name: collection
      # Cosmos DB container/collection name for actor state storage.
      value: "{env:COSMOSDB_COLLECTION}"
    - name: actorStateStore
      value: "true"
# Component-level scoping: eventstore and eventstore-admin can access this state store.
# Actors run in-process under the eventstore app-id. Admin.Server performs read-only
# admin queries and health probes. Domain services have zero state store access --
# no read, no write. This enforces the zero-trust posture (D4).
scopes:
  - eventstore
  - eventstore-admin
