# Gitleaks config — extends the default rule set and suppresses known false
# positives. Scanned by the secret-scan job in .github/workflows/ci.yml
# (gitleaks 8.21.2, which expects the singular [allowlist] table).

[extend]
useDefault = true

[allowlist]
description = "Known false positives: BMAD plugin training content, synthetic operational-evidence validator fixtures, and integration-test fixtures using literal 'invalid.signature' JWTs to exercise auth-failure paths."
paths = [
  '''^_bmad/.*''',
  '''^_bmad-output/test-artifacts/operational-evidence-validator/fixtures/.*raw-secret-marker\.md$''',
  '''^\.agents/skills/bmad-testarch-.*/resources/knowledge/api-testing-patterns\.md$''',
  '''^\.claude/skills/bmad-(tea|testarch-.+)/resources/knowledge/api-testing-patterns\.md$''',
  '''^tests/.*JwtAuthenticationIntegrationTests\.cs$''',
  '''^tests/.*KeycloakAuthenticationTests\.cs$''',
  '''^tests/.*KeycloakTokenHelper\.cs$''',
]
