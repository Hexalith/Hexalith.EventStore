name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # For tag creation and GitHub Release

env:
  DAPR_VERSION: '1.16.0'
  # Bypass NU1902 transitive CVE warnings on OpenTelemetry packages — mirrors the local
  # `-p:NuGetAudit=false` flag documented in CLAUDE.md § Build & Test Commands.
  NuGetAudit: 'false'

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # semantic-release needs full history
          persist-credentials: false
          submodules: true

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore

      - name: Install Dapr CLI
        uses: dapr/setup-dapr@8d980918fd43a2765c143ce7f687665b2d46a6b9 # v2
        with:
          version: ${{ env.DAPR_VERSION }}

      - name: Initialize Dapr
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          command: dapr init

      - name: Run All Tests (Tier 1 + 2)
        run: |
          dotnet test tests/Hexalith.EventStore.Contracts.Tests/ --configuration Release --logger "trx;LogFileName=contracts-results.trx"
          dotnet test tests/Hexalith.EventStore.Client.Tests/ --configuration Release --logger "trx;LogFileName=client-results.trx"
          dotnet test tests/Hexalith.EventStore.Testing.Tests/ --configuration Release --logger "trx;LogFileName=testing-results.trx"
          dotnet test tests/Hexalith.EventStore.Sample.Tests/ --configuration Release --logger "trx;LogFileName=sample-results.trx"
          dotnet test tests/Hexalith.EventStore.SignalR.Tests/ --configuration Release --logger "trx;LogFileName=signalr-results.trx"
          dotnet test tests/Hexalith.EventStore.Admin.Cli.Tests/ --configuration Release --logger "trx;LogFileName=admin-cli-results.trx"
          dotnet test tests/Hexalith.EventStore.Admin.Mcp.Tests/ --configuration Release --logger "trx;LogFileName=admin-mcp-results.trx"
          dotnet test tests/Hexalith.EventStore.Admin.Abstractions.Tests/ --configuration Release --logger "trx;LogFileName=admin-abstractions-results.trx"
          dotnet test tests/Hexalith.EventStore.Admin.Server.Tests/ --configuration Release --logger "trx;LogFileName=admin-server-results.trx"
          dotnet test tests/Hexalith.EventStore.Admin.Server.Host.Tests/ --configuration Release --logger "trx;LogFileName=admin-server-host-results.trx"
          dotnet test tests/Hexalith.EventStore.Admin.UI.Tests/ --configuration Release --logger "trx;LogFileName=admin-ui-results.trx"
          dotnet test tests/Hexalith.EventStore.Server.Tests/ --configuration Release --logger "trx;LogFileName=server-results.trx"

      - name: Install semantic-release
        run: npm ci

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
