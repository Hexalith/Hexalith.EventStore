name: Release

# Runs after CI succeeds on main (workflow_run) so the release never duplicates
# the CI gate and can never publish from a commit whose CI failed. The
# event == 'push' guard keeps pull requests from starting releases.
# semantic-release still decides from the commit history whether a release is
# warranted.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.sha == github.event.workflow_run.head_sha
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: Hexalith/Hexalith.Builds/.github/workflows/domain-release.yml@main
    with:
      solution: Hexalith.EventStore.slnx
      publish-containers: true
      builds-execution-sha: ${{ vars.HEXALITH_BUILDS_RELEASE_SHA }}
      release-authority-url: ${{ vars.HEXALITH_RELEASE_AUTHORITY_URL }}
      release-owner-allowlist: _bmad-output/implementation-artifacts/1-20-github-approval-role-allowlist.json
      container-projects: |
        src/Hexalith.EventStore/Hexalith.EventStore.csproj|eventstore
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      HEXALITH_ZOT_USERNAME: ${{ secrets.HEXALITH_ZOT_USERNAME }}
      HEXALITH_ZOT_API_KEY: ${{ secrets.HEXALITH_ZOT_API_KEY }}
