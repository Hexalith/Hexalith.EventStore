name: Release

# Publication is an explicit operator action. The unprotected preflight proves
# the dispatch selected the current main tip and that exact source already has
# a successful push CI run before the protected release environment is entered.
on:
  workflow_dispatch:

concurrency:
  group: release-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-source:
    name: Verify exact green main source
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Require current main with successful exact-source CI
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$DISPATCH_REF" != "refs/heads/main" ]; then
            echo "Release must be dispatched from refs/heads/main." >&2
            exit 1
          fi
          if [[ ! "$DISPATCH_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "The dispatch source must be an exact lowercase commit SHA." >&2
            exit 1
          fi

          live_main_sha="$(gh api "repos/${REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          if [[ ! "$live_main_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "The live main SHA could not be resolved safely." >&2
            exit 1
          fi
          if [ "$DISPATCH_SHA" != "$live_main_sha" ]; then
            echo "The dispatched source is no longer the live main tip." >&2
            exit 1
          fi

          ci_runs="$(gh api --method GET \
            "repos/${REPOSITORY}/actions/workflows/ci.yml/runs" \
            -f branch=main \
            -f event=push \
            -f head_sha="$DISPATCH_SHA" \
            -f status=success \
            -f per_page=100)"
          if ! printf '%s\n' "$ci_runs" | jq -e --arg sha "$DISPATCH_SHA" '
            [.workflow_runs[] | select(
              .head_sha == $sha and
              .head_branch == "main" and
              .event == "push" and
              .status == "completed" and
              .conclusion == "success"
            )] | length > 0
          ' >/dev/null; then
            echo "No successful push CI run exists for the exact current main SHA." >&2
            exit 1
          fi

  release:
    needs: verify-source
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
    uses: Hexalith/Hexalith.Builds/.github/workflows/domain-release.yml@cf04c419378dfe1bd3c41a9244b5e3283092056e
    with:
      solution: Hexalith.EventStore.slnx
      timeout-minutes: 60
      environment-name: production
      publish-containers: true
      builds-execution-sha: cf04c419378dfe1bd3c41a9244b5e3283092056e
      source-branch: main
      source-ci-workflow: ci.yml
      package-manifest: tools/release-packages.json
      container-projects: |
        src/Hexalith.EventStore/Hexalith.EventStore.csproj|eventstore
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      HEXALITH_ZOT_USERNAME: ${{ secrets.HEXALITH_ZOT_USERNAME }}
      HEXALITH_ZOT_API_KEY: ${{ secrets.HEXALITH_ZOT_API_KEY }}
