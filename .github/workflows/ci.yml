name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Validate Conventional Commits
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
        with:
          configFile: commitlint.config.mjs

  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # semantic-release needs full history
          submodules: true

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        # global.json auto-detected for SDK version

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Validate npm lockfile
        run: npm ci

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore

      - name: Validate GitHub discussion template YAML
        continue-on-error: true
        run: |
          python -m pip install --disable-pip-version-check --quiet pyyaml
          python - <<'PY'
          import glob
          import sys
          import yaml

          files = glob.glob('.github/DISCUSSION_TEMPLATE/*.yml')
          if not files:
            raise SystemExit('No .github/DISCUSSION_TEMPLATE/*.yml files found')

          for path in files:
            with open(path, 'r', encoding='utf-8') as f:
              data = yaml.safe_load(f)
            if not isinstance(data, dict):
              raise SystemExit(f'{path}: root must be a mapping')
            body = data.get('body')
            if not isinstance(body, list):
              raise SystemExit(f'{path}: missing body array')
            has_non_markdown = any(
              isinstance(item, dict) and str(item.get('type', '')).lower() != 'markdown'
              for item in body
            )
            if not has_non_markdown:
              raise SystemExit(f'{path}: body must contain at least one non-Markdown field')

          print('Discussion template YAML validation passed.')
          PY

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit Tests (Tier 1)
        run: |
          dotnet test tests/Hexalith.EventStore.Contracts.Tests/ --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
          dotnet test tests/Hexalith.EventStore.Client.Tests/ --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
          dotnet test tests/Hexalith.EventStore.Testing.Tests/ --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
          dotnet test tests/Hexalith.EventStore.Sample.Tests/ --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
          dotnet test tests/Hexalith.EventStore.SignalR.Tests/ --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
          dotnet test tests/Hexalith.EventStore.Admin.Cli.Tests/ --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
          dotnet test tests/Hexalith.EventStore.Admin.Mcp.Tests/ --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
          dotnet test tests/Hexalith.EventStore.Admin.Abstractions.Tests/ --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
          dotnet test tests/Hexalith.EventStore.Admin.Server.Tests/ --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
          dotnet test tests/Hexalith.EventStore.Admin.Server.Host.Tests/ --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
          dotnet test tests/Hexalith.EventStore.Admin.UI.Tests/ --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"

      - name: Tool Install Smoke Test
        run: |
          dotnet pack src/Hexalith.EventStore.Admin.Cli/ --configuration Release --output ./smoke-test-nupkgs
          dotnet tool install --global Hexalith.EventStore.Admin.Cli --add-source ./smoke-test-nupkgs --version "1.0.0"
          eventstore-admin --version
          eventstore-admin --help | grep -q "health"
          eventstore-admin --help | grep -q "stream"
          eventstore-admin --help | grep -q "projection"
          eventstore-admin --help | grep -q "tenant"
          eventstore-admin --help | grep -q "snapshot"
          eventstore-admin --help | grep -q "backup"
          eventstore-admin --help | grep -q "config"
          ! eventstore-admin nonexistent-command 2>&1
          dotnet tool uninstall --global Hexalith.EventStore.Admin.Cli

      - name: Install DAPR CLI
        run: |
          wget -q https://raw.githubusercontent.com/dapr/cli/v1.16.0/install/install.sh -O - | /bin/bash
          dapr init

      - name: Integration Tests (Tier 2)
        run: >
          dotnet test
          tests/Hexalith.EventStore.Server.Tests/
          --no-build --configuration Release
          --logger "trx;LogFileName=integration-results.trx"
          --collect:"XPlat Code Coverage"

      - name: Test Summary
        if: always()
        run: |
          python - <<'PY'
          import glob
          import os
          import xml.etree.ElementTree as ET

          summary_path = os.environ['GITHUB_STEP_SUMMARY']

          tier1_suites = {
            'Contracts.Tests': 'tests/Hexalith.EventStore.Contracts.Tests/TestResults/**/test-results.trx',
            'Client.Tests': 'tests/Hexalith.EventStore.Client.Tests/TestResults/**/test-results.trx',
            'Testing.Tests': 'tests/Hexalith.EventStore.Testing.Tests/TestResults/**/test-results.trx',
            'Sample.Tests': 'tests/Hexalith.EventStore.Sample.Tests/TestResults/**/test-results.trx',
            'SignalR.Tests': 'tests/Hexalith.EventStore.SignalR.Tests/TestResults/**/test-results.trx',
            'Admin.Cli.Tests': 'tests/Hexalith.EventStore.Admin.Cli.Tests/TestResults/**/test-results.trx',
            'Admin.Mcp.Tests': 'tests/Hexalith.EventStore.Admin.Mcp.Tests/TestResults/**/test-results.trx',
            'Admin.Abstractions.Tests': 'tests/Hexalith.EventStore.Admin.Abstractions.Tests/TestResults/**/test-results.trx',
            'Admin.Server.Tests': 'tests/Hexalith.EventStore.Admin.Server.Tests/TestResults/**/test-results.trx',
            'Admin.Server.Host.Tests': 'tests/Hexalith.EventStore.Admin.Server.Host.Tests/TestResults/**/test-results.trx',
            'Admin.UI.Tests': 'tests/Hexalith.EventStore.Admin.UI.Tests/TestResults/**/test-results.trx',
          }
          tier2_suites = {
            'Server.Tests': 'tests/Hexalith.EventStore.Server.Tests/TestResults/**/integration-results.trx',
          }

          def pick_latest(glob_pattern):
            matches = glob.glob(glob_pattern, recursive=True)
            if not matches:
              return None
            return max(matches, key=os.path.getmtime)

          def parse_trx(path):
            root = ET.parse(path).getroot()
            counters = root.find('.//{*}ResultSummary/{*}Counters')
            if counters is not None:
              total = int(counters.attrib.get('total', '0'))
              passed = int(counters.attrib.get('passed', '0'))
              failed = int(counters.attrib.get('failed', '0'))
              return passed, failed, total

            # Fallback for unexpected TRX shapes without summary counters.
            results = root.findall('.//{*}UnitTestResult')
            total = len(results)
            passed = sum(1 for r in results if r.attrib.get('outcome') == 'Passed')
            failed = sum(1 for r in results if r.attrib.get('outcome') == 'Failed')
            return passed, failed, total

          with open(summary_path, 'a', encoding='utf-8') as summary:
            summary.write('## CI Test Results\n')

            summary.write('### Tier 1 - Unit Tests\n')
            tier1_passed_total = 0
            tier1_failed_total = 0
            for suite, pattern in tier1_suites.items():
              latest = pick_latest(pattern)
              if latest is None:
                summary.write(f'- **{suite}:** no TRX file found\n')
                continue
              passed, failed, total = parse_trx(latest)
              tier1_passed_total += passed
              tier1_failed_total += failed
              summary.write(f'- **{suite}:** {passed} passed, {failed} failed (total: {total})\n')
            summary.write(f'\n**Tier 1 totals:** {tier1_passed_total} passed, {tier1_failed_total} failed\n\n')

            summary.write('### Tier 2 - Integration Tests\n')
            tier2_passed_total = 0
            tier2_failed_total = 0
            for suite, pattern in tier2_suites.items():
              latest = pick_latest(pattern)
              if latest is None:
                summary.write(f'- **{suite}:** no TRX file found\n')
                continue
              passed, failed, total = parse_trx(latest)
              tier2_passed_total += passed
              tier2_failed_total += failed
              summary.write(f'- **{suite}:** {passed} passed, {failed} failed (total: {total})\n')
            summary.write(f'\n**Tier 2 totals:** {tier2_passed_total} passed, {tier2_failed_total} failed\n\n')

            summary.write('### Job Status\n')
            summary.write('${{ job.status }}\n')
          PY

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results
          path: |
            **/test-results.trx
            **/integration-results.trx

      - name: Coverage Summary
        if: always()
        run: |
          python - <<'PY'
          import glob
          import os
          import xml.etree.ElementTree as ET

          summary_path = os.environ['GITHUB_STEP_SUMMARY']
          coverage_files = glob.glob('**/coverage.cobertura.xml', recursive=True)

          if not coverage_files:
            with open(summary_path, 'a', encoding='utf-8') as f:
              f.write('\n### Code Coverage\nNo coverage files found.\n')
            exit(0)

          total_lines = 0
          covered_lines = 0
          total_branches = 0
          covered_branches = 0
          per_project = []

          for cov_file in coverage_files:
            try:
              tree = ET.parse(cov_file)
              root = tree.getroot()
              # Cobertura XML: root has line-rate and branch-rate attributes
              line_rate = float(root.attrib.get('line-rate', '0'))
              branch_rate = float(root.attrib.get('branch-rate', '0'))
              lines_valid = int(root.attrib.get('lines-valid', '0'))
              lines_covered = int(root.attrib.get('lines-covered', '0'))
              branches_valid = int(root.attrib.get('branches-valid', '0'))
              branches_covered = int(root.attrib.get('branches-covered', '0'))

              total_lines += lines_valid
              covered_lines += lines_covered
              total_branches += branches_valid
              covered_branches += branches_covered

              # Extract project name from path
              parts = cov_file.replace('\\', '/').split('/')
              project_name = next((p for p in parts if p.endswith('.Tests')), os.path.basename(os.path.dirname(cov_file)))
              per_project.append((project_name, line_rate * 100, branch_rate * 100, lines_valid))
            except Exception as e:
              print(f'Warning: could not parse {cov_file}: {e}')

          overall_line = (covered_lines / total_lines * 100) if total_lines > 0 else 0
          overall_branch = (covered_branches / total_branches * 100) if total_branches > 0 else 0

          with open(summary_path, 'a', encoding='utf-8') as f:
            f.write(f'\n### Code Coverage\n')
            f.write(f'**Overall:** {overall_line:.1f}% line · {overall_branch:.1f}% branch ({covered_lines}/{total_lines} lines)\n\n')
            f.write('| Project | Line % | Branch % | Lines |\n')
            f.write('|---------|--------|----------|-------|\n')
            for name, line_pct, branch_pct, lines in sorted(per_project):
              f.write(f'| {name} | {line_pct:.1f}% | {branch_pct:.1f}% | {lines} |\n')
          PY

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-reports
          path: '**/coverage.cobertura.xml'

  aspire-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-and-test
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          submodules: true

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-

      - name: Install DAPR CLI
        run: |
          wget -q https://raw.githubusercontent.com/dapr/cli/v1.16.0/install/install.sh -O - | /bin/bash
          dapr init # Full init (not --slim) for Aspire topology

      - name: Aspire Contract Tests (Tier 3)
        run: dotnet test tests/Hexalith.EventStore.IntegrationTests/ --configuration Release

      - name: Test Summary
        if: always()
        run: |
          echo "## Tier 3 Aspire Contract Tests" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: aspire-test-results
          path: "**/TestResults/**"
