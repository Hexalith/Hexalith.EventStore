name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: ci / build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      UseHexalithProjectReferences: 'false'
      UNIT_TEST_PROJECTS: |
        tests/Hexalith.EventStore.Contracts.Tests
        tests/Hexalith.EventStore.Client.Tests
        tests/Hexalith.EventStore.Testing.Tests
        tests/Hexalith.EventStore.SignalR.Tests
        tests/Hexalith.EventStore.Admin.Abstractions.Tests
        tests/Hexalith.EventStore.Admin.Cli.Tests
        tests/Hexalith.EventStore.Admin.Mcp.Tests
        tests/Hexalith.EventStore.Admin.Server.Tests
        tests/Hexalith.EventStore.Admin.Server.Host.Tests
        tests/Hexalith.EventStore.Admin.UI.Tests
        tests/Hexalith.EventStore.AppHost.Tests
        tests/Hexalith.EventStore.DomainService.Tests
        tests/Hexalith.EventStore.QueryRouting.Tests
        tests/Hexalith.EventStore.RestApi.Generators.Tests
        tests/Hexalith.EventStore.Sample.Tests
        tests/Hexalith.EventStore.Testing.Integration.Tests
      NON_BLOCKING_TEST_PROJECTS: |
        tests/Hexalith.EventStore.Admin.UI.E2E
        tests/Hexalith.EventStore.DeferredWorkGovernance.Tests
        tests/Hexalith.EventStore.IntegrationTests
        tests/Hexalith.EventStore.OperationalEvidence.Validator.Tests
        tests/Hexalith.EventStore.Server.Tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - name: Initialize Hexalith.Builds submodule
        run: git -c submodule.recurse=false submodule update --init references/Hexalith.Builds

      - name: Initialize .NET
        uses: ./references/Hexalith.Builds/Github/initialize-dotnet
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('global.json', 'nuget.config', 'Directory.Packages.props', 'references/Hexalith.Builds/Props/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Hexalith.EventStore.slnx -p:Configuration=Release -p:UseHexalithProjectReferences=false
      - name: Build
        run: dotnet build Hexalith.EventStore.slnx --no-restore --configuration Release -warnaserror -p:UseHexalithProjectReferences=false
      - name: Validate test project manifest
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t discovered < <(
            find tests -mindepth 2 -maxdepth 2 -name '*.csproj' -printf '%h\n' |
              sed 's#^\./##' |
              grep -v '^tests/Hexalith.EventStore.TestSubscriber$' |
              sort -u
          )
          mapfile -t expected < <(
            {
              printf '%s\n' "$UNIT_TEST_PROJECTS"
              printf '%s\n' "$NON_BLOCKING_TEST_PROJECTS"
            } |
              sed '/^[[:space:]]*$/d' |
              sort -u
          )
          if ! diff -u <(printf '%s\n' "${expected[@]}") <(printf '%s\n' "${discovered[@]}"); then
            echo "CI test manifest is missing or over-declaring test projects." >&2
            exit 1
          fi

      - name: Unit tests (Tier 1)
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r proj; do
            [ -z "$proj" ] && continue
            name=$(basename "$proj")
            dotnet test "$proj" --no-build --configuration Release \
              --logger "trx;LogFileName=${name}.trx" \
              --results-directory "TestResults/${name}" \
              --collect:"XPlat Code Coverage"
          done <<< "$UNIT_TEST_PROJECTS"

      - name: Test and coverage summary
        if: always()
        shell: bash
        run: |
          set -uo pipefail
          {
            echo '## Tier 1 unit tests'
            echo ''
            echo '| Project | Total | Passed | Failed |'
            echo '|---|---:|---:|---:|'
          } >> "$GITHUB_STEP_SUMMARY"
          for trx in $(find TestResults -name '*.trx' | sort); do
            proj=$(basename "$trx" .trx)
            counters=$(grep -o '<Counters[^>]*>' "$trx" | head -1)
            get() { echo "$counters" | grep -o "$1=\"[0-9]*\"" | grep -o '[0-9]*'; }
            echo "| $proj | $(get total) | $(get passed) | $(get failed) |" >> "$GITHUB_STEP_SUMMARY"
          done
          # Coverage summary (best-effort, never fails the job).
          dotnet tool install --global dotnet-reportgenerator-globaltool >/dev/null 2>&1 || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          reports=$(find TestResults -name 'coverage.cobertura.xml' -printf '%p;' 2>/dev/null || true)
          if [ -n "$reports" ] && command -v reportgenerator >/dev/null 2>&1; then
            reportgenerator -reports:"$reports" -targetdir:TestResults/coverage-report \
              -reporttypes:MarkdownSummaryGithub >/dev/null 2>&1 || true
            [ -f TestResults/coverage-report/SummaryGithub.md ] && \
              cat TestResults/coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test and coverage evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: blocking-test-results
          path: |
            TestResults/**/*.trx
            TestResults/**/coverage.cobertura.xml
          retention-days: 7
          if-no-files-found: warn

  server-inprocess-tests:
    name: server-inprocess-tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      UseHexalithProjectReferences: 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - name: Initialize Hexalith.Builds submodule
        run: git -c submodule.recurse=false submodule update --init references/Hexalith.Builds

      - name: Initialize .NET
        uses: ./references/Hexalith.Builds/Github/initialize-dotnet
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('global.json', 'nuget.config', 'Directory.Packages.props', 'references/Hexalith.Builds/Props/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore solution
        run: dotnet restore Hexalith.EventStore.slnx -p:Configuration=Release -p:UseHexalithProjectReferences=false
      - name: Build solution
        run: dotnet build Hexalith.EventStore.slnx --configuration Release --no-restore -warnaserror -p:UseHexalithProjectReferences=false
      - name: Run Server.Tests without live sidecar tests
        run: >
          dotnet test tests/Hexalith.EventStore.Server.Tests/
          --no-build --configuration Release
          --filter "Category!=LiveSidecar"
          --logger "trx;LogFileName=server-inprocess-results.trx"
          --results-directory TestResults/server-inprocess
          --collect:"XPlat Code Coverage"

      - name: Upload server test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server-inprocess-test-results
          path: |
            TestResults/**/*.trx
            TestResults/**/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 7

  # Governance/evidence suites that are intentionally advisory: they run on every push/PR so the
  # projects declared in NON_BLOCKING_TEST_PROJECTS actually execute and produce signal, but a
  # failure is surfaced (red job) without blocking the CI success trigger that gates release.
  # Server.Tests is covered by the blocking `server-inprocess-tests` job and the live-sidecar
  # integration workflow; IntegrationTests needs a full Aspire-in-CI host (tracked separately),
  # so both are excluded here to avoid guaranteed-failure noise.
  non-blocking-tests:
    name: non-blocking-tests (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    env:
      UseHexalithProjectReferences: 'false'
      ADVISORY_TEST_PROJECTS: |
        tests/Hexalith.EventStore.Admin.UI.E2E
        tests/Hexalith.EventStore.DeferredWorkGovernance.Tests
        tests/Hexalith.EventStore.OperationalEvidence.Validator.Tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - name: Initialize Hexalith.Builds submodule
        run: git -c submodule.recurse=false submodule update --init references/Hexalith.Builds

      - name: Initialize .NET
        uses: ./references/Hexalith.Builds/Github/initialize-dotnet
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('global.json', 'nuget.config', 'Directory.Packages.props', 'references/Hexalith.Builds/Props/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Hexalith.EventStore.slnx -p:Configuration=Release -p:UseHexalithProjectReferences=false

      - name: Build
        run: dotnet build Hexalith.EventStore.slnx --no-restore --configuration Release -warnaserror -p:UseHexalithProjectReferences=false

      - name: Advisory test suites
        shell: bash
        run: |
          set -uo pipefail
          status=0
          while IFS= read -r proj; do
            [ -z "$proj" ] && continue
            name=$(basename "$proj")
            echo "::group::$name"
            dotnet test "$proj" --no-build --configuration Release \
              --logger "trx;LogFileName=${name}.trx" \
              --results-directory "TestResults/${name}" \
              --collect:"XPlat Code Coverage" || status=1
            echo "::endgroup::"
          done <<< "$ADVISORY_TEST_PROJECTS"
          exit $status

      - name: Upload advisory test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: advisory-test-results
          path: |
            TestResults/**/*.trx
            TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
          retention-days: 7
