name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # MinVer needs full history

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        # global.json auto-detected for SDK version

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore

      - name: Validate GitHub discussion template YAML
        run: |
          python -m pip install --disable-pip-version-check --quiet pyyaml
          python - <<'PY'
          import glob
          import sys
          import yaml

          files = glob.glob('.github/DISCUSSION_TEMPLATE/*.yml')
          if not files:
            raise SystemExit('No .github/DISCUSSION_TEMPLATE/*.yml files found')

          for path in files:
            with open(path, 'r', encoding='utf-8') as f:
              data = yaml.safe_load(f)
            if not isinstance(data, dict):
              raise SystemExit(f'{path}: root must be a mapping')
            body = data.get('body')
            if not isinstance(body, list):
              raise SystemExit(f'{path}: missing body array')
            has_non_markdown = any(
              isinstance(item, dict) and str(item.get('type', '')).lower() != 'markdown'
              for item in body
            )
            if not has_non_markdown:
              raise SystemExit(f'{path}: body must contain at least one non-Markdown field')

          print('Discussion template YAML validation passed.')
          PY

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit Tests (Tier 1)
        run: >
          dotnet test
          tests/Hexalith.EventStore.Contracts.Tests/
          tests/Hexalith.EventStore.Client.Tests/
          tests/Hexalith.EventStore.Testing.Tests/
          --no-build --configuration Release
          --logger "trx;LogFileName=test-results.trx"

      - name: Install DAPR CLI
        run: |
          wget -q https://raw.githubusercontent.com/dapr/cli/v1.16.0/install/install.sh -O - | /bin/bash
          dapr init --slim

      - name: Integration Tests (Tier 2)
        run: >
          dotnet test
          tests/Hexalith.EventStore.Server.Tests/
          --no-build --configuration Release
          --logger "trx;LogFileName=integration-results.trx"

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results
          path: |
            **/test-results.trx
            **/integration-results.trx

  aspire-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-and-test
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-

      - name: Install DAPR CLI
        run: |
          wget -q https://raw.githubusercontent.com/dapr/cli/v1.16.0/install/install.sh -O - | /bin/bash
          dapr init # Full init (not --slim) for Aspire topology

      - name: Aspire Contract Tests (Tier 3)
        run: dotnet test tests/Hexalith.EventStore.IntegrationTests/ --configuration Release

      - name: Test Summary
        if: always()
        run: |
          echo "## Tier 3 Aspire Contract Tests" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: aspire-test-results
          path: "**/TestResults/**"
