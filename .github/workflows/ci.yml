name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    # Keep checkout local: the shared workflow uses submodules:true, which trips
    # actions/checkout recursive cleanup on nested submodules inside root submodules.
    name: ci / build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NuGetAudit: 'false'
      UseHexalithProjectReferences: 'false'
      UNIT_TEST_PROJECTS: |
        tests/Hexalith.EventStore.Contracts.Tests
        tests/Hexalith.EventStore.Client.Tests
        tests/Hexalith.EventStore.Testing.Tests
        tests/Hexalith.EventStore.SignalR.Tests
        tests/Hexalith.EventStore.Admin.Abstractions.Tests
        tests/Hexalith.EventStore.Admin.Cli.Tests
        tests/Hexalith.EventStore.Admin.Mcp.Tests
        tests/Hexalith.EventStore.Admin.Server.Tests
        tests/Hexalith.EventStore.Admin.Server.Host.Tests
        tests/Hexalith.EventStore.Admin.UI.Tests
        tests/Hexalith.EventStore.AppHost.Tests
        tests/Hexalith.EventStore.DomainService.Tests
        tests/Hexalith.EventStore.QueryRouting.Tests
        tests/Hexalith.EventStore.Sample.Tests
        tests/Hexalith.EventStore.Testing.Integration.Tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: false

      - name: Initialize build submodules
        uses: Hexalith/Hexalith.Builds/Github/initialize-build@main

      - name: Initialize .NET
        uses: Hexalith/Hexalith.Builds/Github/initialize-dotnet@main
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Hexalith.EventStore.slnx -p:Configuration=Release -p:UseHexalithProjectReferences=false -p:NuGetAudit=false

      - name: Build
        run: dotnet build Hexalith.EventStore.slnx --no-restore --configuration Release -warnaserror -p:UseHexalithProjectReferences=false -p:NuGetAudit=false

      - name: Unit tests (Tier 1)
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r proj; do
            [ -z "$proj" ] && continue
            name=$(basename "$proj")
            dotnet test "$proj" --no-build --configuration Release \
              --logger "trx;LogFileName=${name}.trx" \
              --results-directory "TestResults/${name}" \
              --collect:"XPlat Code Coverage"
          done <<< "$UNIT_TEST_PROJECTS"

      - name: Upload test and coverage evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: blocking-test-results
          path: |
            TestResults/**/*.trx
            TestResults/**/coverage.cobertura.xml
          retention-days: 7
          if-no-files-found: warn

  server-inprocess-tests:
    name: server-inprocess-tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NuGetAudit: 'false'
      UseHexalithProjectReferences: 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: false

      - name: Initialize build submodules
        uses: Hexalith/Hexalith.Builds/Github/initialize-build@main

      - name: Initialize .NET
        uses: Hexalith/Hexalith.Builds/Github/initialize-dotnet@main
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore solution
        run: dotnet restore Hexalith.EventStore.slnx -p:Configuration=Release -p:UseHexalithProjectReferences=false -p:NuGetAudit=false

      - name: Build solution
        run: dotnet build Hexalith.EventStore.slnx --configuration Release --no-restore -warnaserror -p:UseHexalithProjectReferences=false -p:NuGetAudit=false

      - name: Run Server.Tests without live sidecar tests
        run: >
          dotnet test tests/Hexalith.EventStore.Server.Tests/
          --no-build --configuration Release
          --filter "Category!=LiveSidecar"
          --logger "trx;LogFileName=server-inprocess-results.trx"
          --results-directory TestResults/server-inprocess
          --collect:"XPlat Code Coverage"

      - name: Upload server test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: server-inprocess-test-results
          path: |
            TestResults/**/*.trx
            TestResults/**/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 7
