name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    uses: Hexalith/Hexalith.Builds/.github/workflows/domain-ci.yml@main
    with:
      solution: Hexalith.EventStore.slnx
      build-timeout-minutes: 40
      run-consumer-validation: true
      unit-test-projects: |
        tests/Hexalith.EventStore.Contracts.Tests
        tests/Hexalith.EventStore.Client.Tests
        tests/Hexalith.EventStore.Testing.Tests
        tests/Hexalith.EventStore.SignalR.Tests
        tests/Hexalith.EventStore.Admin.Abstractions.Tests
        tests/Hexalith.EventStore.Admin.Cli.Tests
        tests/Hexalith.EventStore.Admin.Mcp.Tests
        tests/Hexalith.EventStore.Admin.Server.Tests
        tests/Hexalith.EventStore.Admin.Server.Host.Tests
        tests/Hexalith.EventStore.Admin.UI.Tests
        tests/Hexalith.EventStore.AppHost.Tests
        tests/Hexalith.EventStore.DomainService.Tests
        tests/Hexalith.EventStore.QueryRouting.Tests
        tests/Hexalith.EventStore.RestApi.Generators.Tests
        tests/Hexalith.EventStore.Sample.Tests
        tests/Hexalith.EventStore.Testing.Integration.Tests
        tests/Hexalith.EventStore.Server.Tests

  tenants-source-mode:
    name: ci / tenants-source-mode
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      UseHexalithProjectReferences: 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: false

      - name: Initialize root-declared submodules
        uses: Hexalith/Hexalith.Builds/Github/initialize-build@main

      - name: Initialize .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json

      - name: Restore source-mode AppHost tests
        run: >-
          dotnet restore tests/Hexalith.EventStore.AppHost.Tests/Hexalith.EventStore.AppHost.Tests.csproj
          -p:Configuration=Debug
          -p:UseHexalithProjectReferences=true

      - name: Build source-mode AppHost tests
        run: >-
          dotnet build tests/Hexalith.EventStore.AppHost.Tests/Hexalith.EventStore.AppHost.Tests.csproj
          --no-restore
          --configuration Debug
          -warnaserror
          -p:UseHexalithProjectReferences=true

      - name: Verify Tenants source-mode topology guardrails
        run: >-
          dotnet test tests/Hexalith.EventStore.AppHost.Tests/Hexalith.EventStore.AppHost.Tests.csproj
          --no-build
          --configuration Debug
          --filter FullyQualifiedName~TenantsApiLaunchSettingsTests
          -p:UseHexalithProjectReferences=true
