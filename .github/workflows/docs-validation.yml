name: Documentation Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Bypass NU1902 transitive CVE warnings on OpenTelemetry packages — mirrors the local
  # `-p:NuGetAudit=false` flag documented in CLAUDE.md § Build & Test Commands.
  NuGetAudit: 'false'

jobs:
  lint-and-links:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Lint Markdown
        run: npx markdownlint-cli2 "docs/**/*.md" "README.md" "CONTRIBUTING.md" "CHANGELOG.md" "CODE_OF_CONDUCT.md"

      - name: Verify DAPR SDK version pin consistency
        run: bash scripts/check-doc-versions.sh

      - name: Restore lychee cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lycheecache
          key: lychee-${{ hashFiles('lychee.toml') }}
          restore-keys: lychee-

      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: "docs/**/*.md README.md CONTRIBUTING.md CHANGELOG.md CODE_OF_CONDUCT.md"
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: true

  sample-build:
    # STALE CONTENT MAPPING:
    # When this job fails, review the corresponding documentation pages:
    #   samples/Hexalith.EventStore.Sample/ build failure:
    #     → docs/getting-started/quickstart.md (code examples reference sample project)
    #     → README.md (programming model code examples)
    #   tests/Hexalith.EventStore.Sample.Tests/ test failure:
    #     → docs/getting-started/quickstart.md (expected behavior may have changed)
    #     → README.md (if behavior examples are affected)
    # Future mappings (add as documentation grows):
    #   Additional sample projects → corresponding tutorial/guide pages
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # semantic-release validation and tag-aware docs checks need full history

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        # global.json auto-detected for SDK version

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-

      - name: Restore
        run: |
          dotnet restore samples/Hexalith.EventStore.Sample.Tests/
          dotnet restore tests/Hexalith.EventStore.Sample.Tests/

      - name: Build
        run: |
          dotnet build samples/Hexalith.EventStore.Sample.Tests/ --configuration Release --no-restore
          dotnet build tests/Hexalith.EventStore.Sample.Tests/ --configuration Release --no-restore

      - name: Test (Domain unit tests)
        run: dotnet test tests/Hexalith.EventStore.Sample.Tests/ --configuration Release --no-build

      - name: Test (Quickstart smoke tests)
        run: dotnet test samples/Hexalith.EventStore.Sample.Tests/ --configuration Release --no-build
