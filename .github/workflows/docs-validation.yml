name: Documentation Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-links:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Lint Markdown
        run: npx markdownlint-cli2 "docs/**/*.md" "README.md" "CONTRIBUTING.md" "CHANGELOG.md" "CODE_OF_CONDUCT.md"

      - name: Restore lychee cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .lycheecache
          key: lychee-${{ hashFiles('lychee.toml') }}
          restore-keys: lychee-

      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: "docs/**/*.md README.md CONTRIBUTING.md CHANGELOG.md CODE_OF_CONDUCT.md"
          token: ${{ secrets.GITHUB_TOKEN }}
          fail: true

  sample-build:
    # STALE CONTENT MAPPING:
    # When this job fails, review the corresponding documentation pages:
    #   samples/Hexalith.EventStore.Sample/ build failure:
    #     → docs/getting-started/quickstart.md (code examples reference sample project)
    #     → README.md (programming model code examples)
    #   tests/Hexalith.EventStore.Sample.Tests/ test failure:
    #     → docs/getting-started/quickstart.md (expected behavior may have changed)
    #     → README.md (if behavior examples are affected)
    # Future mappings (add as documentation grows):
    #   Additional sample projects → corresponding tutorial/guide pages
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # MinVer needs full history

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        # global.json auto-detected for SDK version

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore samples/Hexalith.EventStore.Sample/

      - name: Build
        run: dotnet build samples/Hexalith.EventStore.Sample/ --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/Hexalith.EventStore.Sample.Tests/ --configuration Release
