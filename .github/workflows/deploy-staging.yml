name: Deploy Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: true

      - name: Login to registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login registry.hexalith.com -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Build and push eventstore
        run: |
          docker build -f src/Hexalith.EventStore.EventStore/Dockerfile \
            -t registry.hexalith.com/eventstore:staging-latest .
          docker push registry.hexalith.com/eventstore:staging-latest

      - name: Build and push sample
        run: |
          docker build -f samples/Hexalith.EventStore.Sample/Dockerfile \
            -t registry.hexalith.com/sample:staging-latest .
          docker push registry.hexalith.com/sample:staging-latest

      - name: Deploy to staging
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            kubectl rollout restart deployment/eventstore -n eventstore-staging
            kubectl rollout restart deployment/sample -n eventstore-staging
            kubectl rollout status deployment/eventstore -n eventstore-staging --timeout=120s
            kubectl rollout status deployment/sample -n eventstore-staging --timeout=120s
