name: API Reference Docs

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-api-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release -p:ApiReferenceBuild=true

      - name: Restore local tools
        run: dotnet tool restore

      - name: Generate API documentation
        run: |
          for assembly in Contracts Client Server Testing Aspire; do
            echo "Generating docs for Hexalith.EventStore.$assembly..."
            dotnet defaultdocumentation \
              --AssemblyFilePath "src/Hexalith.EventStore.$assembly/bin/Release/net10.0/Hexalith.EventStore.$assembly.dll" \
              --OutputDirectoryPath "docs/reference/api/Hexalith.EventStore.$assembly" \
              --GeneratedAccessModifiers Public \
              --GeneratedPages Namespaces,Types \
              --AssemblyPageName "index" \
              --LogLevel Warning
          done

      - name: Inject auto-generated header
        run: |
          find docs/reference/api -name "*.md" -path "*/Hexalith.EventStore.*/*" | while read -r file; do
            if ! head -1 "$file" | grep -q "AUTO-GENERATED"; then
              sed -i '1i\<!-- AUTO-GENERATED by DefaultDocumentation. Do not edit manually. -->\' "$file"
            fi
          done

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          commit-message: "docs: update auto-generated API reference for ${{ github.ref_name }}"
          title: "docs: update API reference for ${{ github.ref_name }}"
          body: |
            Auto-generated API reference documentation update for release `${{ github.ref_name }}`.

            Generated by [DefaultDocumentation](https://github.com/Doraku/DefaultDocumentation) from XML doc comments.

            **Packages documented:**
            - Hexalith.EventStore.Contracts
            - Hexalith.EventStore.Client
            - Hexalith.EventStore.Server
            - Hexalith.EventStore.Testing
            - Hexalith.EventStore.Aspire
          branch: docs/api-reference-${{ github.ref_name }}
          base: main
          labels: documentation
          delete-branch: true
