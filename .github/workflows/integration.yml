name: Integration Tests

# Dedicated live-`daprd` integration suite. These tests (Category=LiveSidecar) need a real DAPR
# sidecar + Redis (via `dapr init`) and are intentionally OFF the per-push release path: they run
# here so flaky infrastructure never blocks semantic-release, while still giving signal on the
# adapter edge (actor/state-store round-trips). See
# sprint-change-proposal-2026-06-22-ci-release-retier.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DAPR_VERSION: '1.18.0'
  # Bypass NU1902 transitive CVE warnings on OpenTelemetry packages — mirrors the local
  # `-p:NuGetAudit=false` flag documented in CLAUDE.md § Build & Test Commands.
  NuGetAudit: 'false'
  UseHexalithProjectReferences: 'false'

jobs:
  live-sidecar:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - name: Initialize Hexalith.Builds submodule
        run: git -c submodule.recurse=false submodule update --init references/Hexalith.Builds

      - name: Initialize .NET
        uses: ./references/Hexalith.Builds/Github/initialize-dotnet
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('global.json', 'nuget.config', 'Directory.Packages.props', 'references/Hexalith.Builds/Props/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Hexalith.EventStore.slnx -p:Configuration=Release -p:UseHexalithProjectReferences=false -p:NuGetAudit=false

      - name: Initialize Dapr
        uses: ./references/Hexalith.Builds/Github/dapr-init
        with:
          version: ${{ env.DAPR_VERSION }}

      - name: Run Live-Sidecar Integration Tests (Tier 2)
        run: |
          dotnet test tests/Hexalith.EventStore.Server.Tests/ --configuration Release --no-restore -p:UseHexalithProjectReferences=false -p:NuGetAudit=false --filter "Category=LiveSidecar" --logger "trx;LogFileName=live-sidecar-results.trx" --results-directory TestResults/live-sidecar --collect:"XPlat Code Coverage"

      - name: Upload live-sidecar test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: live-sidecar-test-results
          path: |
            TestResults/**/*.trx
            TestResults/**/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 7

      # NOTE: the Tier-3 `IntegrationTests` project spins up a full Aspire DistributedApplication
      # (Projects.Hexalith_EventStore_AppHost) which `dapr init` alone does not satisfy. Running it
      # reliably in GitHub-hosted CI needs a dedicated Aspire-in-CI setup and is tracked as a
      # follow-up — see sprint-change-proposal-2026-06-22-ci-release-retier.md.
