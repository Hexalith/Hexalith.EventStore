name: Perf Lab

# Manual-trigger only for the initial scaffold. Add a nightly schedule once the
# baseline is established and any flakiness in steady-state measurements is gone.
on:
  workflow_dispatch:
    inputs:
      scenarios:
        description: 'Comma-separated scenario names (nfr7, nfr39, nfr17). Defaults to nfr7.'
        required: false
        default: 'nfr7'

permissions:
  contents: read

env:
  DAPR_VERSION: '1.16.0'

jobs:
  load-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EVENTSTORE_BASE_URL: http://localhost:5170
      LOAD_TEST_SCENARIOS: ${{ github.event.inputs.scenarios }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        # global.json auto-detected for SDK version

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-

      - name: Install Dapr CLI
        uses: dapr/setup-dapr@8d980918fd43a2765c143ce7f687665b2d46a6b9 # v2
        with:
          version: ${{ env.DAPR_VERSION }}

      - name: Initialize Dapr
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          command: dapr init

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Start AppHost in background
        run: |
          set -euo pipefail
          mkdir -p /tmp/perf-lab
          nohup dotnet run --no-build --configuration Release \
            --project src/Hexalith.EventStore.AppHost \
            > /tmp/perf-lab/apphost.log 2>&1 &
          echo $! > /tmp/perf-lab/apphost.pid
          echo "AppHost PID $(cat /tmp/perf-lab/apphost.pid)"

      - name: Wait for EventStore endpoint
        run: |
          set -euo pipefail
          deadline=$(( SECONDS + 300 ))
          until curl -sSf "${EVENTSTORE_BASE_URL}/health" > /dev/null 2>&1; do
            if (( SECONDS > deadline )); then
              echo "EventStore did not become healthy within 5 minutes. AppHost log tail:"
              tail -n 200 /tmp/perf-lab/apphost.log || true
              exit 1
            fi
            sleep 3
          done
          echo "EventStore healthy at ${EVENTSTORE_BASE_URL}"

      - name: Run load harness
        run: >
          dotnet run --no-build --configuration Release
          --project perf/Hexalith.EventStore.LoadTests

      - name: Stop AppHost
        if: always()
        run: |
          if [[ -f /tmp/perf-lab/apphost.pid ]]; then
            pid=$(cat /tmp/perf-lab/apphost.pid)
            kill "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true
          fi

      - name: Upload NBomber reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nbomber-reports
          path: perf/Hexalith.EventStore.LoadTests/reports/
          retention-days: 30

      - name: Upload AppHost log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apphost-log
          path: /tmp/perf-lab/apphost.log
          retention-days: 14
