# DAPR State Store Component -- Local Development (D1, NFR13)
# =============================================================
# Redis-backed state store for actor state, snapshots, and command status tracking.
# Composite key pattern: {tenant}||{domain}||{aggregateId} (D1)
#
# Command Status TTL (D2):
#   The 24-hour default TTL for command status entries is set at the APPLICATION level
#   via DaprClient.SaveStateAsync metadata (ttlInSeconds: 86400), NOT at the component level.
#   Redis supports per-key TTL natively. PostgreSQL state store uses a cleanup routine.
#   This design keeps the component config backend-agnostic (NFR27, NFR29).
#
# Component Scoping (AC #2, AC #4, AC #13):
#   eventstore accesses actor state, snapshots, and command status.
#   eventstore-admin reads admin indexes and performs direct health/state probes.
#   Domain services (sample) have zero state store access -- no read, no write.
#
# Adding New Domain Services:
#   DO NOT add new domain services to scopes. Domain services have zero state store
#   access (D4). If a domain service needs configuration data, use a separate scoped
#   component (not the actor state store).
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: "{env:REDIS_HOST|localhost:6379}"
    - name: redisPassword
      value: "{env:REDIS_PASSWORD}"
    - name: actorStateStore
      value: "true"
# Component-level scoping: eventstore and eventstore-admin can access this state store.
# Actors run in-process under the eventstore app-id. Admin.Server performs read-only
# admin queries and health probes. Domain services (sample) have zero state store
# access -- no read, no write. This enforces the zero-trust posture (D4).
scopes:
  - eventstore
  - eventstore-admin
