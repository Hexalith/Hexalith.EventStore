# DAPR Access Control Configuration for the sample sidecar (D4, FR34, NFR15)
# ===========================================================================
# This Configuration CRD is loaded ONLY by the sample sidecar and therefore
# governs which CALLERS may invoke the sample domain service through Dapr.
#
# Allowed callers in the local topology:
#   - eventstore: actor host / domain service invoker. Uses POST-only Dapr service
#     invocation to process domain commands.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: accesscontrol-sample
spec:
  accessControl:
    defaultAction: allow  # Allow-by-default in self-hosted mode; change to deny with mTLS
    trustDomain: "public"
    policies:
      - appId: eventstore
        defaultAction: deny
        trustDomain: "public"
        namespace: "default"
        operations:
          - name: /**
            httpVerb: ['POST']
            action: allow
