# Hexalith.EventStore — Kubernetes Secrets Template
# ===================================================
# Replace placeholder values with your actual connection strings and
# configuration before applying. Values under stringData are plain text
# and are base64-encoded by Kubernetes at storage time.
#
# Supplementary to the Aspire publisher output.
# See docs/guides/deployment-kubernetes.md for the full deployment guide.
#
# Quick start (using kubectl create secret instead of applying this file):
#   kubectl create secret generic dapr-secrets \
#     --from-literal=postgres-connection-string='host=...;port=5432;username=...;password=...;database=eventstore;sslmode=require' \
#     --from-literal=dapr-trust-domain='your-trust-domain.example.com' \
#     --from-literal=dapr-namespace='hexalith' \
#     -n hexalith

---
# Application secrets (state store, pub/sub connection strings)
apiVersion: v1
kind: Secret
metadata:
  name: dapr-secrets
  namespace: hexalith
  labels:
    app.kubernetes.io/part-of: hexalith-eventstore
type: Opaque
stringData:
  # PostgreSQL state store (if using statestore-postgresql.yaml)
  postgres-connection-string: "<REPLACE: host=mydb.postgres.database.azure.com;port=5432;username=dapr;password=SECRET;database=eventstore;sslmode=require>"

  # RabbitMQ pub/sub (if using pubsub-rabbitmq.yaml)
  rabbitmq-connection-string: "<REPLACE: amqp://user:pass@rabbitmq.example.com:5672/>"

  # DAPR access control identity
  dapr-trust-domain: "<REPLACE: your-trust-domain.example.com>"
  dapr-namespace: "hexalith"

  # Cosmos DB state store (if using statestore-cosmosdb.yaml, uncomment below)
  # cosmosdb-url: "<REPLACE: https://myaccount.documents.azure.com:443/>"
  # cosmosdb-key: "<REPLACE: primary-or-secondary-key>"
  # cosmosdb-database: "eventstore"
  # cosmosdb-collection: "actorstate"

  # Kafka pub/sub (if using pubsub-kafka.yaml, uncomment below)
  # kafka-brokers: "<REPLACE: broker1:9092,broker2:9092>"
  # kafka-auth-type: "none"

  # Azure Service Bus pub/sub (if using pubsub-servicebus.yaml, uncomment below)
  # servicebus-connection-string: "<REPLACE: Endpoint=sb://mynamespace.servicebus.windows.net/;SharedAccessKeyName=dapr;SharedAccessKey=KEY>"

---
# DAPR Kubernetes Secret Store Component
# This component allows DAPR to read secrets from Kubernetes Secrets
# via the secretKeyRef syntax in component metadata.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: kubernetes-secrets
  namespace: hexalith
spec:
  type: secretstores.kubernetes
  version: v1
  metadata: []
