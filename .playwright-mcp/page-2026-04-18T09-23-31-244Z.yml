    - heading "Hexalith EventStore — UI Refresh Patterns" [level=1] [ref=e13]
    - paragraph [ref=e14]:
      - text: This sample demonstrates three approaches for handling real-time projection change signals from EventStore via SignalR. Each pattern uses the
      - code [ref=e15]: EventStoreSignalRClient
      - text: to subscribe to the "changed" signal — a notification that contains only
      - code [ref=e16]: (projectionType, tenantId)
      - text: with no data payload. Patterns must re-query the EventStore to get updated data.
