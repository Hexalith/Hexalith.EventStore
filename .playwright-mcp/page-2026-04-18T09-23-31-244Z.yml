    - heading "Recommended Learning Order" [level=2] [ref=e53]
    - list [ref=e54]:
      - listitem [ref=e55]:
        - strong [ref=e56]:
          - 'link "Pattern 2: Silent Reload" [ref=e57] [cursor=pointer]':
            - /url: /pattern-silent-reload
        - text: — Simplest (~20 lines). Data refreshes automatically on signal with debounce. Start here for immediate gratification.
      - listitem [ref=e58]:
        - strong [ref=e59]:
          - 'link "Pattern 1: Notification" [ref=e60] [cursor=pointer]':
            - /url: /pattern-notification
        - text: — Adds user control. A persistent message bar prompts the user to refresh when data changes. No layout shifts until user acts.
      - listitem [ref=e61]:
        - strong [ref=e62]:
          - 'link "Pattern 3: Selective Refresh" [ref=e63] [cursor=pointer]':
            - /url: /pattern-selective-refresh
        - text: — Most sophisticated. Each component manages its own subscription and refreshes independently. Best UX but more implementation effort.
    - heading "How to Run" [level=2] [ref=e64]
    - group [ref=e65]:
      - list [ref=e66]:
        - listitem [ref=e67]:
          - strong [ref=e68]: "Start the Aspire AppHost:"
          - code [ref=e69]: dotnet run --project src/Hexalith.EventStore.AppHost
        - listitem [ref=e70]:
          - strong [ref=e71]: Verify EventStore is running
          - text: with SignalR enabled (
          - code [ref=e72]: EventStore:SignalR:Enabled = true
          - text: ). The Aspire topology configures this automatically.
        - listitem [ref=e73]:
          - strong [ref=e74]: Authentication is handled automatically by the sample UI.
          - text: In local dev without Keycloak it generates a development JWT for
          - code [ref=e75]: tenant-a
          - text: . When Keycloak is enabled, it requests a demo token using the Aspire-wired realm configuration.
        - listitem [ref=e76]:
          - strong [ref=e77]: Open the Blazor UI URL
          - text: from the Aspire dashboard (look for "sample-blazor-ui" resource).
        - listitem [ref=e78]:
          - strong [ref=e79]: "Try the patterns:"
          - text: Navigate using the sidebar. Use the Counter domain sample to trigger projection changes and observe each pattern's behavior.